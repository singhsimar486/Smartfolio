# Render Blueprint - Infrastructure as Code
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: foliowise-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: foliowise-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: FRONTEND_URL
        sync: false  # Set manually after Vercel deployment
      - key: ALPHA_VANTAGE_API_KEY
        sync: false  # Set manually - get free key at alphavantage.co
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: foliowise-db
    plan: free
    databaseName: foliowise
    user: foliowise_user
